<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Analyzer</title>
    <style>
        body { font-family: monospace; margin: 0; padding: 10px; }
        #logs-container { display: inline-block; min-width: 100%; }
        #controls { position: sticky; top: 0; background-color: white; z-index: 10; padding: 10px 0; border-bottom: 1px solid #ccc; margin-bottom: 5px; }
        .log-entry { padding: 0; border-bottom: 1px solid #eee; white-space: nowrap; cursor: pointer; display: flex; align-items: stretch; }
        .log-entry:hover { background-color: #f0f0f0; }
        .log-entry-gutter {
            width: 8px;
            min-width: 8px;
            cursor: pointer;
            margin-right: 6px;
        }
        .log-entry-gutter:hover { background-color: #ccc; }
        .log-entry-gutter.interesting { background-color: #64b5f6; }
        .log-entry-gutter.interesting:hover { background-color: #42a5f5; }
        
        .log-content-wrapper { 
            padding: 2px 0; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
        }
        .log-entry.search-match { background-color: #ffff99; }
        .log-entry.active-entry { background-color: #ffe0b2; outline: 1px solid #ffcc80; }
        .log-entry.marked-entry { background-color: #d0f0c0; }
        body.modal-open { overflow: hidden; }
        /* Modal styles */
        .modal { display: none; position: fixed; z-index: 20; left: 0; top: 0; width: 100%; height: 100%; overflow: hidden; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 2vh auto; width: 90%; height: 96vh; display: flex; flex-direction: column; position: relative; border: 1px solid #888; box-sizing: border-box; border-radius: 4px; overflow: hidden; }
        .modal-header { padding: 10px 20px; border-bottom: 1px solid #ddd; background: #fefefe; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .close { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; margin-left: auto; }
        .close:hover, .close:focus { color: black; text-decoration: none; }
        .json-key { color: brown; }
        .json-value { color: navy; }
        .json-string { color: olive; }
        .json-boolean { color: blue; font-weight: bold; }
        .json-null { color: magenta; font-weight: bold; }
        
        /* Clean indicator for Expandable/Partial content */
        /* Border color logic moved to .log-entry-gutter.interesting */
        
        .drill-downable::after {
            content: " ⋯";
            color: #999;
            font-weight: bold;
            padding-left: 5px;
        }

        .modal-match { background-color: yellow; color: black; }
        .modal-match.active { background-color: orange; outline: 2px solid red; }
        pre { white-space: pre-wrap; word-wrap: break-word; margin-top: 0; }
        #modal-text { overflow-y: auto; flex-grow: 1; padding: 0; margin: 0; }
        
        .log-row { display: flex; font-family: monospace; height: 20px; line-height: 20px; }
        .log-row:hover { background-color: #fafafa; }
        .log-gutter { 
            width: 30px; 
            min-width: 30px;
            background: #f5f5f5; 
            border-right: 1px solid #e0e0e0;
            text-align: center;
            color: #999;
            flex-shrink: 0;
            user-select: none;
            padding-top: 0;
        }
        .gutter-btn { 
            cursor: pointer; 
            font-weight: bold; 
            color: #444; 
            display: inline-block;
            width: 100%;
            line-height: 20px;
        }
        .gutter-btn:hover { color: #000; background-color: #e0e0e0; }
        
        .log-content { 
            white-space: pre; 
            overflow: hidden;
            padding-left: 8px; 
            flex-grow: 1;
            padding-top: 0;
        }

        .hidden-row { display: none !important; }

        .collapsible-placeholder { 
            color: #999; 
            cursor: pointer;
            padding: 0 5px;
            background: #f5f5f5;
            border-radius: 2px;
            user-select: none;
        }
        
        /* Virtual scroll container styles */
        #modal-text {
            overflow-y: auto;
            overflow-x: auto;
            flex-grow: 1;
            padding: 0;
            margin: 0;
            position: relative;
        }
        #virtual-spacer {
            width: 1px;
        }
        #virtual-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
        }
    </style>
</head>
<body>
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
        <img src="https://docs.sdcio.dev/assets/logos/SDC-transparent-withname-100x133.png" alt="SDC Logo" style="height: 50px;">
        <h1 style="margin: 0;">Log Analyzer</h1>
    </div>
    <div id="controls">
        <label for="datastore-filter">Filter by Datastore:</label>
        <select id="datastore-filter">
            <option value="">All</option>
        </select>
        
        <label for="time-input" style="margin-left: 20px;">Jump to Time:</label>
        <input type="text" id="time-input" placeholder="HH:MM:SS" size="10" onkeydown="if(event.key === 'Enter') jumpToTime()">
        <button onclick="jumpToTime()">Go</button>

        <label for="search-input" style="margin-left: 20px;">Search:</label>
        <input type="text" id="search-input" placeholder="Type to highlight...">
        <button onclick="clearSearch()">Clear</button>
    </div>
    <div id="logs-container">Loading...</div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" id="modal-search" placeholder="Find in modal..." size="30">
                <button id="modal-prev" title="Previous match">▲</button>
                <button id="modal-next" title="Next match">▼</button>
                <button id="modal-copy" title="Copy JSON" style="margin-left: 10px;">Copy</button>
                <span id="modal-stats" style="font-size: 0.9em; color: #666;"></span>
                <span class="close">&times;</span>
            </div>
            <pre id="modal-text"></pre>
        </div>
    </div>

    <script>
        const interestingMsgs = [
            "writeback synctree", "populated tree", "got SetResponse from SBI",
            "received request", "gnmi request", "adding intent to tree",
            "deletes owner", "updates owner", "sync content", "synctree after sync apply",
            "received netconf response", "deviation tree"
        ];

        let isLoading = false;
        let currentOffset = 0;
        let topOffset = 0;
        const initialLimit = 100;
        const limit = 50;
        let hasMore = true;
        let currentFilter = "";
        let currentSearchTerm = "";
        
        // Modal state
        let currentModalData = null;
        let modalSearchMatches = [];
        let modalSearchIndex = -1;

        async function fetchLogs(reset = false) {
            if (isLoading) return;
            if (reset) {
                currentOffset = 0;
                topOffset = 0;
                hasMore = true;
                document.getElementById('logs-container').innerHTML = '';
            }
            if (!hasMore) return;

            isLoading = true;
            const fetchLimit = currentOffset === 0 ? initialLimit : limit;
            
            try {
                const response = await fetch(`/api/logs?offset=${currentOffset}&limit=${fetchLimit}&datastore=${encodeURIComponent(currentFilter)}`);
                const newLogs = await response.json();
                
                if (newLogs.length < fetchLimit) {
                    hasMore = false;
                }
                
                // We should just render the new logs
                renderLogs(newLogs);
                
                currentOffset += newLogs.length;

                // If we haven't filled the screen yet, fetch more
                if (document.body.scrollHeight <= window.innerHeight && hasMore) {
                     isLoading = false; // Reset to allow recursion
                     await fetchLogs();
                }

            } catch (e) {
                console.error(e);
            } finally {
                isLoading = false;
            }
        }

        async function init() {
            await fetchDatastores();
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                currentSearchTerm = e.target.value.toLowerCase();
                applySearchHighlight();
            });

            await fetchLogs(true);
            
            // Infinite scroll
            window.onscroll = function() {
                // Bottom
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                    fetchLogs();
                }
                // Top
                if (window.scrollY < 100 && topOffset > 0 && !isLoading) {
                    fetchPrevious();
                }
            };
        }

        async function fetchDatastores() {
            const response = await fetch('/api/datastores');
            const datastores = await response.json();
            const filterSelect = document.getElementById('datastore-filter');
            
            // Clear existing options except All
            while (filterSelect.options.length > 1) {
                filterSelect.remove(1);
            }

            datastores.forEach(ds => {
                const option = document.createElement('option');
                option.value = ds;
                option.textContent = ds;
                filterSelect.appendChild(option);
            });
            
            filterSelect.onchange = (e) => {
                currentFilter = e.target.value;
                fetchLogs(true);
            };
        }
        
        async function jumpToTime() {
            const timeVal = document.getElementById('time-input').value.trim();
            if (!timeVal) return;
            
            isLoading = true;
            try {
                const res = await fetch(`/api/offset?time=${encodeURIComponent(timeVal)}&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await res.json();
                
                // Set offsets manually
                currentOffset = data.offset;
                topOffset = data.offset;
                hasMore = true;
                
                // Clear container
                document.getElementById('logs-container').innerHTML = '';
                
                // Release lock temporarily so fetchLogs can start
                isLoading = false; 
                await fetchLogs();
                
                // Auto-load previous to allow scrolling up
                if (topOffset > 0) {
                    await fetchPrevious();
                }

            } catch (e) {
                console.error(e);
                isLoading = false;
            }
        }

        function clearSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.value = '';
            searchInput.dispatchEvent(new Event('input'));
        }

        function applySearchHighlight() {
            const container = document.getElementById('logs-container');
            const entries = container.getElementsByClassName('log-entry');
            
            for (let div of entries) {
                if (!currentSearchTerm) {
                    div.classList.remove('search-match');
                    continue;
                }
                
                // Search in the full log data attached to the element
                if (div.logData && JSON.stringify(div.logData).toLowerCase().includes(currentSearchTerm)) {
                     div.classList.add('search-match');
                } else {
                     div.classList.remove('search-match');
                }
            }
        }

        function reorderLogKeys(log) {
            if (log.raw) return log;

            const priorityKeys = ["time", "msg", "datastore-name", "logger", "transaction-id"];
            const excludedKeys = ["content", "raw-request", "updates", "deletes", "raw-response", "response", "explicit-deletes", "updates-owner", "deletes-owner", "tree", "data"];
            const newLog = {};

            // Add priority keys first if they exist
            priorityKeys.forEach(key => {
                if (log.hasOwnProperty(key)) {
                    newLog[key] = log[key];
                }
            });

            // Add remaining keys
            Object.keys(log).forEach(key => {
                if (!priorityKeys.includes(key) && !excludedKeys.includes(key)) {
                    newLog[key] = log[key];
                }
            });

            return newLog;
        }

        function renderLogs(logsToRender, prepend = false) {
            const container = document.getElementById('logs-container');
            // Remove 'Loading...' if present
            if (container.textContent === 'Loading...' && logsToRender.length > 0) {
                 container.innerHTML = '';
            }
            
            // Use fragment for batch insertion
            const fragment = document.createDocumentFragment();

            logsToRender.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.logData = log; // Attach data for search

                let isInteresting = false;
                if (log.msg && interestingMsgs.includes(log.msg)) {
                    div.classList.add('highlight');
                    // Ellipsis indicator should attach to content, not the flex container
                    isInteresting = true;
                }
                
                // Check search immediately for new items
                if (currentSearchTerm && JSON.stringify(log).toLowerCase().includes(currentSearchTerm)) {
                    div.classList.add('search-match');
                }

                // Gutter (acts as the clickable strip)
                const gutter = document.createElement('div');
                gutter.className = 'log-entry-gutter';
                if (isInteresting) {
                    gutter.classList.add('interesting');
                }
                gutter.title = 'Click to mark/highlight';
                gutter.onclick = (e) => {
                    e.stopPropagation();
                    div.classList.toggle('marked-entry');
                };
                div.appendChild(gutter);

                // Content
                const content = document.createElement('span');
                content.className = 'log-content-wrapper';
                // Display whole log line
                if (log.raw) {
                    content.textContent = log.raw;
                } else {
                    const orderedLog = reorderLogKeys(log);
                    content.textContent = JSON.stringify(orderedLog);
                }
                // Attach ellipsis indicator directly after text content
                if (isInteresting) {
                    content.classList.add('drill-downable');
                }
                div.appendChild(content);
                
                let clickTimeout = null;

                div.onclick = (e) => {
                   const selection = window.getSelection();
                   if (selection.toString().length > 0) {
                       return;
                   }

                   if (clickTimeout) clearTimeout(clickTimeout);
                   clickTimeout = setTimeout(() => {
                       document.querySelectorAll('.log-entry.active-entry').forEach(el => el.classList.remove('active-entry'));
                       div.classList.add('active-entry');

                       if (isInteresting || true) { // Make all clickable for inspection
                           showDetails(log);
                       }
                   }, 250);
                };

                div.ondblclick = (e) => {
                    if (clickTimeout) clearTimeout(clickTimeout);

                    const selection = window.getSelection();
                    const text = selection.toString().trim();
                    if (text) {
                        const searchInput = document.getElementById('search-input');
                        searchInput.value = text;
                        // Trigger input event to update highlight
                        searchInput.dispatchEvent(new Event('input'));
                        
                        // Prevent propagation
                        e.stopPropagation();
                    }
                };
                fragment.appendChild(div);
            });

            if (prepend && container.firstChild) {
                container.insertBefore(fragment, container.firstChild);
            } else {
                container.appendChild(fragment);
            }
        }

        async function fetchPrevious() {
            if (isLoading) return;
            isLoading = true;

            // Compute range
            const fetchLimit = limit; // 50
            const start = Math.max(0, topOffset - fetchLimit);
            const count = topOffset - start;
            
            if (count <= 0) {
                isLoading = false;
                return;
            }

            try {
                const response = await fetch(`/api/logs?offset=${start}&limit=${count}&datastore=${encodeURIComponent(currentFilter)}`);
                const newLogs = await response.json();
                
                if (newLogs.length > 0) {
                    const oldHeight = document.body.scrollHeight;
                    renderLogs(newLogs, true);
                    const newHeight = document.body.scrollHeight;
                    // Adjust scroll to maintain position
                    window.scrollTo(0, window.scrollY + (newHeight - oldHeight));
                    
                    topOffset = start;
                }

            } catch (e) {
                console.error(e);
            } finally {
                isLoading = false;
            }
        }

        // Virtual Scroll State (Global)
        let flatNodes = [];
        let visibleIndices = []; 
        let visibleMatchIndices = [];
        let matchMap = new Map();
        let collapsedNodeIds = new Set();
        const ROW_HEIGHT = 20;
        
        async function showDetails(logData) {
            const modal = document.getElementById("myModal");
            const modalText = document.getElementById("modal-text");
            
            // 1. Show modal immediately with loading state
            modal.style.display = "block";
            document.body.classList.add('modal-open');
            modalText.innerHTML = '<div style="padding: 20px; font-size: 1.2em; color: #666;">Processing comprehensive log data... <span id="proc-status"></span></div>';
            
            // Yield to UI to allow render
            await new Promise(r => setTimeout(r, 10));

            try {
                // Clear previous search state
                document.getElementById('modal-search').value = "";
                document.getElementById('modal-stats').textContent = "";
                modalSearchMatches = [];
                modalSearchIndex = -1;

                // Reset virtualization state
                flatNodes = [];
                collapsedNodeIds = new Set();
                visibleIndices = [];
                visibleMatchIndices = [];
                matchMap = new Map();
                
                // Deep clone and process
                const data = JSON.parse(JSON.stringify(logData));
                
                const statusSpan = document.getElementById('proc-status');
                if (statusSpan) statusSpan.textContent = "(Parsing nested JSON)";
                await new Promise(r => setTimeout(r, 10)); // Yield
                
                processNestedJson(data);

                if (statusSpan) statusSpan.textContent = "(Decoding leaf variants)";
                await new Promise(r => setTimeout(r, 10)); // Yield
                
                await processLeafVariants(data);
                
                if (statusSpan) statusSpan.textContent = "(Building view)";
                await new Promise(r => setTimeout(r, 10)); // Yield

                currentModalData = data;
                
                // Initialize container structure for virtual scroll
                modalText.innerHTML = '<div id="virtual-spacer"></div><div id="virtual-content"></div>';
                
                // Initial render
                renderModalContent();

            } catch (e) {
                console.error(e);
                modalText.innerHTML = `<div style="padding: 20px; color: red;">Error processing log: ${e.message}</div>`;
            }
        }

        function renderModalContent() {
            if (!currentModalData) return;
            const term = document.getElementById('modal-search').value;
            const modalText = document.getElementById("modal-text");
            
            // Flatten if needed
            if (flatNodes.length === 0) {
                 flattenData(currentModalData);
            }
            
            // Calculate Matches
            calculateMatches(term);
            
            // Calculate Layout
            recalcVisibleRows();
            
            // Setup Scroll
            modalText.onscroll = onModalScroll;
            onModalScroll(); 
            
            // Update Stats
            updateModalStats();
            
            if (term && visibleMatchIndices.length > 0) {
                 navigateToMatch(0);
            }
        }

        function onModalScroll() {
            const modalText = document.getElementById("modal-text");
            const spacer = document.getElementById("virtual-spacer");
            const content = document.getElementById("virtual-content");
            if (!spacer || !content) return; 

            const scrollTop = modalText.scrollTop;
            const containerHeight = modalText.clientHeight;
            
            // Update spacer
            spacer.style.height = (visibleIndices.length * ROW_HEIGHT) + 'px';
            
            // Calculate slice
            const startIndex = Math.floor(scrollTop / ROW_HEIGHT);
            const buffer = 10;
            const effectiveSortStart = Math.max(0, startIndex - buffer);
            const count = Math.ceil(containerHeight / ROW_HEIGHT) + 2 * buffer;
            const endIndex = Math.min(visibleIndices.length, effectiveSortStart + count);
            
            // Render slice
            let html = '';
            const term = document.getElementById('modal-search').value;
            let regex = null;
            if (term) regex = new RegExp(`(${escapeRegExp(term)})`, 'gi');

            for (let i = effectiveSortStart; i < endIndex; i++) {
                const nodeIdx = visibleIndices[i];
                if (nodeIdx < flatNodes.length) {
                    const node = flatNodes[nodeIdx];
                    html += renderRow(node, regex, i);
                }
            }
            
            content.innerHTML = html;
            content.style.transform = `translateY(${effectiveSortStart * ROW_HEIGHT}px)`;
        }

        function renderRow(node, regex, visualIndex) {
            const indent = '  '.repeat(node.depth);
            let content = '';
            
            // Helper for HL
            const hl = (txt) => {
                if (!regex) return escapeHtml(txt);
                return escapeHtml(txt).replace(regex, '<span class="modal-match">$1</span>');
            };
            const escapeHtml = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Common parts
            let keyPart = '';
            if (node.key !== undefined) {
                keyPart = `<span class="json-key">"${hl(node.key)}"</span>: `;
            }
            let comma = node.comma ? ',' : '';

            // Render based on type
            if (node.type.startsWith('scalar')) {
                let valHtml = '';
                if (node.value === null) valHtml = '<span class="json-null">null</span>';
                else if (typeof node.value === 'boolean') valHtml = `<span class="json-boolean">${node.value}</span>`;
                else if (typeof node.value === 'number') valHtml = `<span class="json-value">${node.value}</span>`;
                else {
                    const strVal = hl(node.value);
                    if (node.type === 'scalar') {
                        valHtml = `<span class="json-string">"${strVal}"</span>`;
                    } else if (node.type === 'scalar_multiline_start') {
                        valHtml = `<span class="json-string">"${strVal}`;
                    } else if (node.type === 'scalar_multiline_mid') {
                        valHtml = `<span class="json-string">${strVal}`;
                    } else if (node.type === 'scalar_multiline_end') {
                         valHtml = `<span class="json-string">${strVal}"</span>`;
                    }
                }
                
                content = `${keyPart}${valHtml}${comma}`;
            } else if (node.type === 'start_obj') {
                const isCollapsed = collapsedNodeIds.has(node.id);
                const placeholder = isCollapsed ? `<span id="cp-${node.id}" class="collapsible-placeholder" style="display:inline" onclick="toggleCollapse(${node.id})">...}</span>` : '';
                const brace = '{' + placeholder;
                content = `${keyPart}${brace}`;
                if (!isCollapsed && node.count === 0) content += '}'; // Empty object
            } else if (node.type === 'start_arr') {
                const isCollapsed = collapsedNodeIds.has(node.id);
                const placeholder = isCollapsed ? `<span id="cp-${node.id}" class="collapsible-placeholder" style="display:inline" onclick="toggleCollapse(${node.id})">...]</span>` : '';
                const bracket = '[' + placeholder;
                content = `${keyPart}${bracket}`;
                if (!isCollapsed && node.count === 0) content += ']'; // Empty array
            } else if (node.type === 'end_obj') {
                content = `}${comma}`;
            } else if (node.type === 'end_arr') {
                content = `]${comma}`;
            }

            // Gutter
            let gutter = '';
            if (node.type === 'start_obj' || node.type === 'start_arr') {
                 if (node.count > 0) {
                     const isCollapsed = collapsedNodeIds.has(node.id);
                     const sign = isCollapsed ? '+' : '-';
                     gutter = `<span class="gutter-btn" onclick="toggleCollapse(${node.id})">${sign}</span>`;
                 }
            }

            // Active Row Highlight
            let extraClass = '';
            if (modalSearchIndex !== -1 && visibleMatchIndices[modalSearchIndex] === visualIndex) {
                 extraClass = ' active-match-row';
            }

            return `<div class="log-row${extraClass}" style="height:${ROW_HEIGHT}px">
                    <div class="log-gutter">${gutter}</div>
                    <div class="log-content">${indent}${content}</div>
                </div>`;
        }

        function flattenData(data) {
            flatNodes = [];
            let idCounter = 0;

            function recurse(obj, depth, key, isLast) {
                const comma = !isLast;

                if (obj === null || typeof obj !== 'object') {
                    if (typeof obj === 'string' && obj.includes('\n')) {
                        const lines = obj.split(/\r?\n/);
                        lines.forEach((line, idx) => {
                            let type = 'scalar_multiline_mid';
                            let nodeKey = undefined;
                            let nodeComma = false;
                            
                            if (idx === 0) {
                                type = 'scalar_multiline_start';
                                nodeKey = key;
                            }
                            if (idx === lines.length - 1) {
                                type = 'scalar_multiline_end';
                                nodeComma = comma;
                            }
                            
                            flatNodes.push({ type, depth: depth + (idx > 0 ? 1 : 0), key: nodeKey, value: line, comma: nodeComma });
                        });
                        return;
                    }
                    flatNodes.push({ type: 'scalar', depth, key, value: obj, comma });
                    return;
                }

                if (Array.isArray(obj)) {
                    if (obj.length === 0) {
                         flatNodes.push({ type: 'start_arr', depth, key, count: 0, comma });
                         return;
                    }
                    const id = ++idCounter;
                    const index = flatNodes.length;
                    // Store comma here for collapsed state
                    flatNodes.push({ type: 'start_arr', depth, key, id, count: obj.length, comma: comma }); 
                    
                    for (let i = 0; i < obj.length; i++) {
                        recurse(obj[i], depth + 1, undefined, i === obj.length - 1);
                    }
                    
                    flatNodes[index].skipTo = flatNodes.length; // Index of end node
                    flatNodes.push({ type: 'end_arr', depth, parentId: id, comma });
                    return;
                }

                const keys = Object.keys(obj);
                if (keys.length === 0) {
                     flatNodes.push({ type: 'start_obj', depth, key, count: 0, comma });
                     return;
                }

                const id = ++idCounter;
                const index = flatNodes.length;
                flatNodes.push({ type: 'start_obj', depth, key, id, count: keys.length, comma: comma });
                
                for (let i = 0; i < keys.length; i++) {
                    recurse(obj[keys[i]], depth + 1, keys[i], i === keys.length - 1);
                }

                flatNodes[index].skipTo = flatNodes.length;
                flatNodes.push({ type: 'end_obj', depth, parentId: id, comma });
            }

            recurse(data, 0, undefined, true);
        }

        function calculateMatches(term) {
            matchMap.clear();
            if (!term) return;
            const lowerTerm = term.toLowerCase(); 
            
            flatNodes.forEach((node, idx) => {
                let text = '';
                if (node.key) text += node.key;
                if (node.value !== undefined && node.value !== null) text += String(node.value);
                
                if (text.toLowerCase().includes(lowerTerm)) {
                    matchMap.set(idx, true);
                }
            });
        }

        function recalcVisibleRows() {
            visibleIndices = [];
            let i = 0;
            while (i < flatNodes.length) {
                const node = flatNodes[i];
                visibleIndices.push(i);
                
                // If collapsed, skip to text node
                if ((node.type === 'start_obj' || node.type === 'start_arr') && collapsedNodeIds.has(node.id) && node.count > 0) {
                     // We skip the children AND the end node
                     if (node.skipTo) {
                         i = node.skipTo;
                     }
                } 
                i++;
            }
            recalcMatchIndices();
        }

        function recalcMatchIndices() {
            visibleMatchIndices = [];
            visibleIndices.forEach((nodeIdx, visualIndex) => {
                if (matchMap.has(nodeIdx)) {
                    visibleMatchIndices.push(visualIndex);
                }
            });
        }

        function toggleCollapse(id) {
            if (collapsedNodeIds.has(id)) {
                collapsedNodeIds.delete(id);
            } else {
                collapsedNodeIds.add(id);
            }
            recalcVisibleRows();
            onModalScroll();
            
            const term = document.getElementById('modal-search').value;
            if (term) {
                 recalcMatchIndices();
                 updateModalStats();
            }
        }

        function navigateToMatch(index) {
            if (visibleMatchIndices.length === 0) return;
             
             // Wrap index
            if (index >= visibleMatchIndices.length) index = 0;
            if (index < 0) index = visibleMatchIndices.length - 1;
            
            modalSearchIndex = index;
            
            // Scroll to it
            const targetVisualIdx = visibleMatchIndices[modalSearchIndex];
            // We need to calculate scroll position
            const modalText = document.getElementById("modal-text");
            // Approximate position
            modalText.scrollTop = targetVisualIdx * ROW_HEIGHT - (modalText.clientHeight / 2);
            
            updateModalStats();
        }

        function updateModalStats() {
            const stats = document.getElementById('modal-stats');
            const term = document.getElementById('modal-search').value;
            if (visibleMatchIndices.length > 0) {
                stats.textContent = `${modalSearchIndex + 1} of ${visibleMatchIndices.length}`;
            } else if (term) {
                stats.textContent = "0 matches";
            } else {
                stats.textContent = "";
            }
        }
        
        function escapeRegExp(string) {
            return string.replace(/[.*+?^!:${}()|[\]\\]/g, '\\$&');
        }

        function processNestedJson(obj) {
            for (const key in obj) {
                if (typeof obj[key] === 'string') {
                    if ((obj[key].startsWith('{') || obj[key].startsWith('[')) && (key === 'content' || key === 'raw-request' || key === 'updates' || key === 'deletes' || key === 'raw-response' || key === 'explicit-deletes' || key === 'data')) {
                         try {
                             obj[key] = JSON.parse(obj[key]);
                             processNestedJson(obj[key]);
                         } catch (e) {}
                    }
                    // Basic XML pretty print for 'response' field
                    if (key === 'response' && typeof obj[key] === 'string' && obj[key].startsWith('<')) {
                         // Simple formatting: newlines after >
                         // Or we can rely on displaying as pre-wrap, but it might be one long string.
                         // Let's perform a simple replace for formatting
                         obj[key] = formatXml(obj[key]);
                    }
                } else if (typeof obj[key] === 'object' && obj[key] !== null) {
                    processNestedJson(obj[key]);
                }
            }
        }

        function formatXml(xml) {
            let formatted = '';
            let pad = 0;
            // Add newlines
            xml = xml.replace(/>\s*</g, '>\r\n<');
            
            xml.split('\r\n').forEach(node => {
                let indent = 0;
                if (node.match(/.+<\/\w[^>]*>$/)) {
                    indent = 0;
                } else if (node.match(/^<\/\w/)) {
                    if (pad !== 0) pad -= 1;
                } else if (node.match(/^<\w[^>]*[^\/]>.*$/)) {
                    indent = 1;
                }
                
                formatted += '  '.repeat(pad) + node + '\r\n';
                pad += indent;
            });
            return formatted.trim();
        }

        async function processLeafVariants(obj) {
             const targets = [];
             
             // Recursively traverse and collect targets
             function traverse(o) {
                 if (typeof o !== 'object' || o === null) return;
                 
                 // Check for leafVariant
                 if (o.hasOwnProperty('leafVariant') && typeof o.leafVariant === 'string') {
                     targets.push(o);
                 }
                 
                 // Recurse children
                 for (const key in o) {
                     // Skip what we just added or non-objects
                     if (key !== 'leafVariant_decoded' && key !== 'leafVariant_error') {
                         traverse(o[key]);
                     }
                 }
             }

             traverse(obj);
             
             if (targets.length === 0) return;

             try {
                 const values = targets.map(t => t.leafVariant);
                 
                 // Send batch request
                 const res = await fetch('/api/decode/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(values)
                 });
                 
                 if (!res.ok) throw new Error(await res.text());
                 
                 const results = await res.json();
                 
                 // Apply results back to objects
                 for (let i = 0; i < targets.length; i++) {
                     const result = results[i];
                     const target = targets[i];
                     
                     // Check if result indicates error (our backend logic returns {error: "..."} on failure)
                     // But valid result is also an object. 
                     // Valid TypedValue JSON usually has keys like 'string_val', 'int_val', etc.
                     // Error object has 'error' key.
                     if (result && result.error) {
                         target['leafVariant_error'] = result.error;
                     } else {
                         target['leafVariant_decoded'] = result;
                     }
                 }
                 
             } catch (e) {
                 console.error("Batch decode failed", e);
                 // Fallback error marking
                 targets.forEach(t => t['leafVariant_error'] = "Batch failed: " + e.message);
             }
        }

        async function decodeValue(base64Str) {
            const res = await fetch('/api/decode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ value: base64Str })
            });
            if (!res.ok) throw new Error(await res.text());
            return await res.json();
        }

        // Modal close logic
        const modal = document.getElementById("myModal");
        const span = document.getElementsByClassName("close")[0];
        const closeModal = function() { 
            modal.style.display = "none";
            document.body.classList.remove('modal-open');
        }
        span.onclick = closeModal;
        window.onclick = function(event) {
            if (event.target == modal) { closeModal(); }
        }
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                if (modal.style.display === "block") {
                    closeModal();
                } else {
                    clearSearch();
                }
            }
        });

        // Overview shortcut: fill selected text into main search (Ctrl+Shift+F or Alt+S)
        document.addEventListener('keydown', function(event) {
            const modalEl = document.getElementById('myModal');
            const modalVisible = modalEl && modalEl.style.display === 'block';
            // Act only in overview view
            if (modalVisible) return;

            const key = String(event.key || '').toLowerCase();
            const isShortcut = (event.ctrlKey && event.shiftKey && key === 'f') || (event.altKey && key === 's');
            if (!isShortcut) return;

            // Don't interfere while typing in inputs/textareas or content-editable elements
            const active = document.activeElement;
            if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;

            const selectionText = window.getSelection().toString().trim();
            if (!selectionText) return;

            const searchInput = document.getElementById('search-input');
            if (!searchInput) return;

            searchInput.value = selectionText;
            searchInput.dispatchEvent(new Event('input'));
            searchInput.focus();

            event.preventDefault();
            event.stopPropagation();
        });
        
        // Modal Search Listeners
        document.getElementById('modal-search').addEventListener('input', () => {
             renderModalContent();
        });
        document.getElementById('modal-next').addEventListener('click', () => {
             navigateToMatch(modalSearchIndex + 1);
        });
        document.getElementById('modal-prev').addEventListener('click', () => {
             navigateToMatch(modalSearchIndex - 1);
        });
        document.getElementById('modal-search').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (e.shiftKey) {
                    navigateToMatch(modalSearchIndex - 1);
                } else {
                    navigateToMatch(modalSearchIndex + 1);
                }
            }
        });

        document.getElementById('modal-copy').addEventListener('click', async () => {
            if (!currentModalData) return;
            try {
                // Generate pretty text from flatNodes (visual representation)
                const text = getPrettyText();
                await navigator.clipboard.writeText(text);
                const btn = document.getElementById('modal-copy');
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            } catch (err) {
                console.error('Failed to copy!', err);
                alert('Failed to copy to clipboard. Ensure you are using localhost or HTTPS.');
            }
        });
        
        function getPrettyText() {
             if (flatNodes.length === 0 && currentModalData) {
                 flattenData(currentModalData);
             }
             if (flatNodes.length === 0) return "";

             return flatNodes.map(node => {
                const indent = '  '.repeat(node.depth);
                let line = indent;
                
                if (node.key !== undefined) {
                    line += `"${node.key}": `;
                }
                
                if (node.type === 'scalar') {
                    if (node.value === null) line += 'null';
                    else if (typeof node.value === 'boolean') line += node.value;
                    else if (typeof node.value === 'number') line += node.value;
                    else line += `"${node.value}"`;
                } else if (node.type === 'scalar_multiline_start') {
                    line += `"${node.value}`;
                } else if (node.type === 'scalar_multiline_mid') {
                    line += node.value;
                } else if (node.type === 'scalar_multiline_end') {
                    line += `${node.value}"`;
                } else if (node.type === 'start_obj') {
                    line += node.count === 0 ? '{}' : '{';
                } else if (node.type === 'start_arr') {
                    line += node.count === 0 ? '[]' : '[';
                } else if (node.type === 'end_obj') {
                    line += '}';
                } else if (node.type === 'end_arr') {
                    line += ']';
                }
                
                if (node.comma) line += ',';
                return line;
             }).join('\n');
        }

        init();
    </script>

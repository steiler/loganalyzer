<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Analyzer</title>
    <style>
        body { font-family: monospace; margin: 0; padding: 10px; }
        #logs-container { display: inline-block; min-width: 100%; }
        #controls { position: sticky; top: 0; background-color: white; z-index: 10; padding: 10px 0; border-bottom: 1px solid #ccc; margin-bottom: 5px; }
        .log-entry { padding: 0; border-bottom: 1px solid #eee; white-space: nowrap; cursor: pointer; display: flex; align-items: stretch; }
        .log-entry:hover { background-color: #f0f0f0; }
        .log-entry-gutter {
            width: 8px;
            min-width: 8px;
            cursor: pointer;
            margin-right: 6px;
        }
        .log-entry-gutter:hover { background-color: #ccc; }
        .log-entry-gutter.interesting { background-color: #64b5f6; }
        .log-entry-gutter.interesting:hover { background-color: #42a5f5; }
        
        .log-content-wrapper { 
            padding: 2px 0; 
            flex-grow: 1; 
            display: flex; 
            align-items: center; 
            overflow: hidden; 
        }
        .log-entry.search-match { background-color: #ffff99; }
        .log-entry.active-entry { background-color: #ffe0b2; outline: 1px solid #ffcc80; }
        .log-entry.marked-entry { background-color: #d0f0c0; }
        .log-entry.error-level { background-color: #ffcccc; }
        .highlight-badge { display: inline-flex; align-items: center; gap: 6px; background: var(--highlight-bg, #e3f2fd); border: 1px solid var(--highlight-border, #90caf9); border-radius: 3px; padding: 2px 8px; margin: 2px; font-size: 0.85em; cursor: pointer; color: #0d47a1; }
        .highlight-badge:hover { background: #bbdefb; }
        .highlight-badge .remove { margin-left: 2px; font-weight: bold; color: inherit; }
        .highlight-badge .swatch { width: 10px; height: 10px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.15); }
        .log-entry.highlight-match { background-color: var(--highlight-color, #ffffcc); }
        body.modal-open { overflow: hidden; }
        /* Modal styles */
        .modal { display: none; position: fixed; z-index: 20; left: 0; top: 0; width: 100%; height: 100%; overflow: hidden; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 2vh auto; width: 90%; height: 96vh; display: flex; flex-direction: column; position: relative; border: 1px solid #888; box-sizing: border-box; border-radius: 4px; overflow: hidden; }
        .modal-header { padding: 10px 20px; border-bottom: 1px solid #ddd; background: #fefefe; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
        .close { color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; margin-left: auto; }
        .close:hover, .close:focus { color: black; text-decoration: none; }
        .json-key { color: brown; }
        .json-value { color: navy; }
        .json-string { color: olive; }
        .json-boolean { color: blue; font-weight: bold; }
        .json-null { color: magenta; font-weight: bold; }
        
        /* Clean indicator for Expandable/Partial content */
        /* Border color logic moved to .log-entry-gutter.interesting */
        
        .drill-downable::after {
            content: " ⋯";
            color: #999;
            font-weight: bold;
            padding-left: 5px;
        }

        .modal-match { background-color: yellow; color: black; }
        .modal-match.active { background-color: orange; outline: 2px solid red; }
        pre { white-space: pre-wrap; word-wrap: break-word; margin-top: 0; }
        #modal-text { overflow-y: auto; flex-grow: 1; padding: 0; margin: 0; }
        
        .log-row { display: flex; font-family: monospace; height: 20px; line-height: 20px; }
        .log-row:hover { background-color: #fafafa; }
        .log-gutter { 
            width: 30px; 
            min-width: 30px;
            background: #f5f5f5; 
            border-right: 1px solid #e0e0e0;
            text-align: center;
            color: #999;
            flex-shrink: 0;
            user-select: none;
            padding-top: 0;
        }
        .gutter-btn { 
            cursor: pointer; 
            font-weight: bold; 
            color: #444; 
            display: inline-block;
            width: 100%;
            line-height: 20px;
        }
        .gutter-btn:hover { color: #000; background-color: #e0e0e0; }
        
        .log-content { 
            white-space: pre; 
            overflow: visible;
            padding-left: 8px; 
            flex-grow: 1;
            padding-top: 0;
        }

        .hidden-row { display: none !important; }

        .collapsible-placeholder { 
            color: #999; 
            cursor: pointer;
            padding: 0 5px;
            background: #f5f5f5;
            border-radius: 2px;
            user-select: none;
        }
        
        /* Virtual scroll container styles */
        #modal-text {
            overflow-y: auto;
            overflow-x: auto;
            flex-grow: 1;
            padding: 0;
            margin: 0;
            position: relative;
        }
        #virtual-spacer {
            width: 1px;
        }
        #virtual-content {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            min-width: max-content; /* allow horizontal overflow for long lines */
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        #new-logs-indicator.fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
        <img src="https://docs.sdcio.dev/assets/logos/SDC-transparent-withname-100x133.png" alt="SDC Logo" style="height: 50px;">
        <h1 style="margin: 0;">Log Analyzer</h1>
    </div>
    <div id="controls">
        <label for="datastore-filter">Filter by Datastore:</label>
        <select id="datastore-filter">
            <option value="">All</option>
        </select>
        
        <label for="time-input" style="margin-left: 20px;">Jump to Time:</label>
        <input type="text" id="time-input" placeholder="HH:MM:SS" size="10" onkeydown="if(event.key === 'Enter') jumpToTime()">
        <button onclick="jumpToTime()">Go</button>
        <button id="jump-latest" onclick="jumpToLatest()" title="Jump to newest log entries">Latest</button>

        <label for="search-input" style="margin-left: 20px;">Search:</label>
        <input type="text" id="search-input" placeholder="Find and navigate...">
        <button id="search-prev" title="Previous match" style="margin-left: 5px;">▲</button>
        <button id="search-next" title="Next match">▼</button>
        <button onclick="clearSearch()" style="margin-left: 5px;">Clear</button>
        <span id="search-stats" style="font-size: 0.9em; color: #666; margin-left: 10px;"></span>
        <div style="margin-top: 10px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px;">
            <label>Highlights:</label>
            <input type="text" id="highlight-input" placeholder="Add highlight term" size="18" aria-label="Add highlight term">
            <button id="highlight-add">Add</button>
            <button onclick="clearHighlights()">Clear All</button>
            <span id="highlights-container" style="display: flex; align-items: center; flex-wrap: wrap; gap: 4px;"></span>
        </div>
    </div>
    <div id="logs-container">Loading...</div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <input type="text" id="modal-search" placeholder="Find in modal..." size="30">
                <button id="modal-prev" title="Previous match">▲</button>
                <button id="modal-next" title="Next match">▼</button>
                <button id="modal-copy" title="Copy JSON" style="margin-left: 10px;">Copy</button>
                <span id="modal-stats" style="font-size: 0.9em; color: #666;"></span>
                <span class="close">&times;</span>
            </div>
            <pre id="modal-text"></pre>
        </div>
    </div>

    <script>
        const interestingMsgs = [
            "writeback synctree", "populated tree", "got SetResponse from SBI",
            "received request", "gnmi request", "adding intent to tree",
            "deletes owner", "updates owner", "sync content", "synctree after sync apply",
            "received netconf response", "deviation tree"
        ];

        let isLoading = false;
        let scrollTimeout = null; // Debounce scroll events
        let currentOffset = 0;
        let topOffset = 0;
        const initialLimit = 100;
        const limit = 50;
        let hasMore = true;
        let currentFilter = "";
        let currentSearchTerm = "";
        let serverSearchMatches = []; // Global match indices from server
        let searchMatchIndex = -1; // Current active match index
        const highlightPalette = ['#ffe082', '#c5e1a5', '#b2ebf2', '#d1c4e9', '#ffccbc', '#f8bbd0', '#c8e6c9', '#bbdefb', '#fff59d', '#e6ee9c', '#b39ddb', '#80cbc4', '#ffab91', '#aed581', '#90caf9', '#f48fb1'];
        let highlightTerms = [];
        let highlightColorMap = {};
        let highlightColorCursor = 0;
        let markedIndices = new Set();
        let stateSaveTimeout = null;
        let restoredOffset = 0;
        let lastGeneration = -1; // Track log file generation for truncation detection
        
        // Follow mode state
        let totalLogCount = 0;
        let lastKnownTotal = 0;
        let pollInterval = null;
        
        // Modal state
        let currentModalData = null;
        let modalSearchMatches = [];
        let modalSearchIndex = -1;

        async function fetchLogs(reset = false, startOffset = null) {
            if (isLoading) return;
            if (reset) {
                currentOffset = startOffset !== null ? startOffset : 0;
                topOffset = currentOffset;
                hasMore = true;
                document.getElementById('logs-container').innerHTML = '';
            }
            if (!hasMore) return;

            isLoading = true;
            const fetchLimit = currentOffset === 0 ? initialLimit : limit;
            
            try {
                const response = await fetch(`/api/logs?offset=${currentOffset}&limit=${fetchLimit}&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await response.json();
                const newLogs = data.logs || data; // Handle both {logs: [], total: N} and legacy array format
                const total = data.total !== undefined ? data.total : null;
                
                // Detect file truncation via generation change
                if (data.generation !== undefined) {
                    if (lastGeneration !== -1 && data.generation !== lastGeneration) {
                        console.log("Log file truncation detected, resetting view state");
                        // Truncation detected - reset all view state since offsets are now invalid
                        currentOffset = 0;
                        topOffset = 0;
                        hasMore = true;
                        markedIndices.clear();
                        document.getElementById('logs-container').innerHTML = '';
                        lastKnownTotal = 0;
                        searchMatchIndex = -1;
                        serverSearchMatches = [];
                    }
                    lastGeneration = data.generation;
                }
                
                if (total !== null) {
                    totalLogCount = total;
                    if (lastKnownTotal === 0) lastKnownTotal = total;
                    checkForNewLogs();
                }
                
                if (newLogs.length < fetchLimit) {
                    hasMore = false;
                }
                
                // We should just render the new logs
                renderLogs(newLogs, false, currentOffset);
                
                currentOffset += newLogs.length;

                // If we haven't filled the screen yet, fetch more
                if (document.body.scrollHeight <= window.innerHeight && hasMore) {
                     isLoading = false; // Reset to allow recursion
                     await fetchLogs();
                }

            } catch (e) {
                console.error(e);
            } finally {
                isLoading = false;
            }
        }

        // Save scroll position when scrolling
        window.addEventListener('scroll', () => {
            debounceSaveViewState();
        }, { passive: true });

        function checkForNewLogs() {
            if (totalLogCount > lastKnownTotal) {
                const newCount = totalLogCount - lastKnownTotal;
                const nearBottom = (window.innerHeight + window.scrollY) >= document.body.scrollHeight - 500;
                // If user is at bottom, auto-load new logs silently
                if (nearBottom) {
                    loadNewLogsAuto();
                } else {
                    // If scrolled away, show indicator
                    showNewLogsIndicator(newCount);
                }
            }
        }

        function showNewLogsIndicator(count) {
            let indicator = document.getElementById('new-logs-indicator');
            if (!indicator) {
                indicator = document.createElement('div');
                indicator.id = 'new-logs-indicator';
                indicator.style.cssText = 'position: fixed; bottom: 20px; right: 20px; background: #4CAF50; color: white; padding: 12px 20px; border-radius: 4px; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 1000; font-family: monospace;';
                indicator.onclick = () => {
                    if (indicator.dismissTimeout) clearTimeout(indicator.dismissTimeout);
                    loadNewLogs();
                    indicator.remove();
                };
                // On mouse enter: pause dismissal
                indicator.addEventListener('mouseenter', () => {
                    if (indicator.dismissTimeout) {
                        clearTimeout(indicator.dismissTimeout);
                        indicator.dismissTimeout = null;
                    }
                    indicator.classList.remove('fade-out');
                });
                // On mouse leave: restart timer
                indicator.addEventListener('mouseleave', () => {
                    indicator.dismissTimeout = setTimeout(() => {
                        indicator.classList.add('fade-out');
                        setTimeout(() => {
                            if (indicator && indicator.parentNode) indicator.remove();
                        }, 500);
                    }, 2000);
                });
                document.body.appendChild(indicator);
            }
            indicator.classList.remove('fade-out');
            if (indicator.dismissTimeout) clearTimeout(indicator.dismissTimeout);
            indicator.textContent = `${count} new log${count > 1 ? 's' : ''} available - Click to load`;
            indicator.dismissTimeout = setTimeout(() => {
                indicator.classList.add('fade-out');
                setTimeout(() => {
                    if (indicator && indicator.parentNode) indicator.remove();
                }, 500);
            }, 2000);
        }

        async function loadNewLogsAuto() {
            // Auto-load new logs when user is at bottom - just append without scroll disruption
            if (isLoading) return;
            const newCount = totalLogCount - lastKnownTotal;
            
            try {
                const response = await fetch(`/api/logs?offset=${currentOffset}&limit=100&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await response.json();
                const newLogs = data.logs || data;
                
                if (newLogs.length > 0) {
                    renderLogs(newLogs, false, currentOffset);
                    currentOffset += newLogs.length;
                    lastKnownTotal = totalLogCount; // Only update after successful load
                    // Remove indicator since we auto-loaded
                    const indicator = document.getElementById('new-logs-indicator');
                    if (indicator) indicator.remove();
                }
            } catch (e) {
                console.error('Auto-load error:', e);
            }
        }

        async function loadNewLogs() {
            await jumpToLatest();
        }

        async function jumpToLatest() {
            if (isLoading) return;

            try {
                // Refresh total so jump always targets the current end of filtered logs.
                const response = await fetch(`/api/logs?offset=0&limit=1&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await response.json();
                const total = data.total !== undefined ? data.total : null;

                if (total !== null) {
                    totalLogCount = total;
                }

                hasMore = true;
                const startOffset = Math.max(0, totalLogCount - initialLimit);
                await fetchLogs(true, startOffset);
                lastKnownTotal = totalLogCount;

                const indicator = document.getElementById('new-logs-indicator');
                if (indicator) indicator.remove();

                setTimeout(() => {
                    window.scrollTo(0, document.body.scrollHeight);
                }, 100);
            } catch (e) {
                console.error('Jump to latest error:', e);
            }
        }

        async function pollForNewLogs() {
            if (!currentFilter) return;  // Remove isLoading check to allow polling regardless of current activity
            
            try {
                const response = await fetch(`/api/logs?offset=0&limit=1&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await response.json();
                const total = data.total !== undefined ? data.total : null;
                
                // Detect file truncation via generation change during polling
                if (data.generation !== undefined) {
                    if (lastGeneration !== -1 && data.generation !== lastGeneration) {
                        console.log("Truncation detected during polling, triggering full reset");
                        // Truncation detected - reset view and reload
                        currentOffset = 0;
                        topOffset = 0;
                        hasMore = true;
                        markedIndices.clear();
                        document.getElementById('logs-container').innerHTML = '';
                        lastKnownTotal = 0;
                        searchMatchIndex = -1;
                        serverSearchMatches = [];
                        await fetchLogs(true, 0);
                    }
                    lastGeneration = data.generation;
                }
                
                if (total !== null && total !== totalLogCount) {
                    totalLogCount = total;
                    checkForNewLogs();
                }
            } catch (e) {
                console.error('Poll error:', e);
            }
        }

        function startPolling() {
            if (pollInterval) return;
            // Poll every 5 seconds
            pollInterval = setInterval(pollForNewLogs, 5000);
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        async function init() {
            await fetchDatastores();
            await loadViewState();
            
            // Always poll for new logs (independent of scroll position)
            startPolling();
            
            // Track scroll position to determine auto-load vs indicator behavior
            window.addEventListener('scroll', () => {
                const nearBottom = (window.innerHeight + window.scrollY) >= document.body.scrollHeight - 500;
                if (nearBottom && !pollInterval) {
                    // Resume polling if scrolled near bottom
                    startPolling();
                }
                // Note: We don't stop polling anymore - it always runs in background
            }, { passive: true });
            
            document.getElementById('search-input').addEventListener('input', (e) => {
                currentSearchTerm = e.target.value.toLowerCase();
                applySearchHighlight();
            });
            
            // Search navigation buttons
            document.getElementById('search-prev').addEventListener('click', () => {
                navigateSearchMatch('prev');
            });
            document.getElementById('search-next').addEventListener('click', () => {
                navigateSearchMatch('next');
            });
            
            // Keyboard shortcuts for search navigation
            document.getElementById('search-input').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    if (e.shiftKey) {
                        navigateSearchMatch('prev');
                    } else {
                        navigateSearchMatch('next');
                    }
                    e.preventDefault();
                }
            });

            const highlightInput = document.getElementById('highlight-input');
            if (highlightInput) {
                highlightInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        addHighlightFromInput();
                        e.preventDefault();
                    }
                });
            }

            const highlightAddBtn = document.getElementById('highlight-add');
            if (highlightAddBtn) {
                highlightAddBtn.addEventListener('click', addHighlightFromInput);
            }

            await fetchLogs(true, restoredOffset || 0);
            
            // Scroll to show the first entry after restore
            if (restoredOffset && restoredOffset > 0) {
                const entries = document.getElementsByClassName('log-entry');
                if (entries.length > 0) {
                    entries[0].scrollIntoView({ behavior: 'auto', block: 'start' });
                }
            }
            
            // Infinite scroll with debouncing
            window.addEventListener('scroll', function() {
                if (scrollTimeout) clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    // Bottom - load more
                    if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                        if (!isLoading && hasMore) {
                            fetchLogs();
                        }
                    }
                    // Top - load previous
                    if (window.scrollY < 100 && topOffset > 0 && !isLoading) {
                        fetchPrevious();
                    }
                }, 50); // 50ms debounce
            }, { passive: true });
        }

        // Save state before page unload (tab close, navigation, refresh)
        window.addEventListener('beforeunload', () => {
            saveViewStateSync();
        });

        // Also save on visibility change (tab goes hidden)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                saveViewStateSync();
            }
        });

        async function fetchDatastores() {
            const response = await fetch('/api/datastores');
            const datastores = await response.json();
            const filterSelect = document.getElementById('datastore-filter');
            
            // Clear existing options except All
            while (filterSelect.options.length > 1) {
                filterSelect.remove(1);
            }

            datastores.forEach(ds => {
                const option = document.createElement('option');
                option.value = ds;
                option.textContent = ds;
                filterSelect.appendChild(option);
            });
            
            filterSelect.onchange = (e) => {
                currentFilter = e.target.value;
                lastKnownTotal = 0; // Reset so new count is calculated correctly for the new filter
                fetchLogs(true);
                debounceSaveViewState();
            };
        }

        async function loadViewState() {
            try {
                const response = await fetch('/api/viewstate');
                const state = await response.json();
                
                if (state.highlightTerms && Array.isArray(state.highlightTerms)) {
                    highlightTerms = state.highlightTerms;
                    highlightColorMap = {};
                    highlightColorCursor = 0;
                    for (const item of highlightTerms) {
                        const lower = item.term.toLowerCase();
                        highlightColorMap[lower] = item.color;
                        highlightColorCursor++;
                    }
                    renderHighlightBadges();
                }
                
                if (state.markedIndices && Array.isArray(state.markedIndices)) {
                    markedIndices = new Set(state.markedIndices);
                }
                
                if (typeof state.offset === 'number' && state.offset >= 0) {
                    restoredOffset = state.offset;
                }
                
                if (state.datastore) {
                    currentFilter = state.datastore;
                    const filterSelect = document.getElementById('datastore-filter');
                    if (filterSelect) {
                        filterSelect.value = state.datastore;
                    }
                }
            } catch (e) {
                console.error("Failed to load view state:", e);
            }
        }

        function getFirstVisibleLogIndex() {
            const container = document.getElementById('logs-container');
            if (!container) return topOffset;
            const entries = container.getElementsByClassName('log-entry');
            if (entries.length === 0) return topOffset;
            
            // Find the first entry that's actually visible in viewport
            // An entry is visible if its bottom is below top of viewport (rect.bottom > 0)
            // and its top is above bottom of viewport (rect.top < window.innerHeight)
            for (let i = 0; i < entries.length; i++) {
                const rect = entries[i].getBoundingClientRect();
                // Entry is visible if it overlaps with viewport
                if (rect.bottom > 0 && rect.top < window.innerHeight) {
                    const idx = parseInt(entries[i].dataset.index);
                    if (!isNaN(idx)) {
                        return Math.max(0, idx);
                    }
                }
            }
            
            // If nothing visible (scrolled above all entries), return first entry's index
            if (entries.length > 0) {
                const idx = parseInt(entries[0].dataset.index);
                if (!isNaN(idx)) {
                    return Math.max(0, idx);
                }
            }
            return topOffset;
        }

        function debounceSaveViewState() {
            if (stateSaveTimeout) clearTimeout(stateSaveTimeout);
            stateSaveTimeout = setTimeout(saveViewState, 1000);
        }

        async function saveViewState() {
            if (stateSaveTimeout) clearTimeout(stateSaveTimeout);
            const visibleOffset = getFirstVisibleLogIndex();
            const state = {
                highlightTerms: highlightTerms,
                markedIndices: Array.from(markedIndices),
                offset: visibleOffset,
                datastore: currentFilter
            };
            try {
                await fetch('/api/viewstate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(state),
                    keepalive: true
                });
            } catch (e) {
                console.error("Failed to save view state:", e);
            }
        }

        function saveViewStateSync() {
            const visibleOffset = getFirstVisibleLogIndex();
            const state = {
                highlightTerms: highlightTerms,
                markedIndices: Array.from(markedIndices),
                offset: visibleOffset,
                datastore: currentFilter
            };
            try {
                navigator.sendBeacon('/api/viewstate', JSON.stringify(state));
            } catch (e) {
                console.error("Failed to save view state via beacon:", e);
            }
        }
        
        async function jumpToTime() {
            const timeVal = document.getElementById('time-input').value.trim();
            if (!timeVal) return;
            
            isLoading = true;
            try {
                const res = await fetch(`/api/offset?time=${encodeURIComponent(timeVal)}&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await res.json();
                
                // Set offsets manually
                currentOffset = data.offset;
                topOffset = data.offset;
                hasMore = true;
                
                // Clear container
                document.getElementById('logs-container').innerHTML = '';
                
                // Release lock temporarily so fetchLogs can start
                isLoading = false; 
                await fetchLogs();
                
                // Auto-load previous to allow scrolling up
                if (topOffset > 0) {
                    await fetchPrevious();
                }

            } catch (e) {
                console.error(e);
                isLoading = false;
            }
        }

        function clearSearch() {
            const searchInput = document.getElementById('search-input');
            searchInput.value = '';
            searchInput.dispatchEvent(new Event('input'));
        }

        async function applySearchHighlight() {
            // Clear highlights first
            if (!currentSearchTerm) {
                serverSearchMatches = [];
                searchMatchIndex = -1;
                updateSearchStats();
                clearAllSearchMatches();
                return;
            }

            // Immediate client-side highlighting of visible entries for responsive feedback
            highlightVisibleMatches();

            // Fetch complete search results from server for navigation
            try {
                const response = await fetch(`/api/search?q=${encodeURIComponent(currentSearchTerm)}&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await response.json();
                serverSearchMatches = data.matches; // Global match indices
                searchMatchIndex = -1; // Reset navigation
                updateSearchStats();
            } catch (e) {
                console.error("Search error:", e);
                serverSearchMatches = [];
                updateSearchStats();
            }
        }

        function highlightVisibleMatches() {
            const container = document.getElementById('logs-container');
            const entries = container.getElementsByClassName('log-entry');
            
            for (let entry of entries) {
                entry.classList.remove('search-match');
                entry.classList.remove('active-entry');
                
                // Highlight if matches current search term
                if (currentSearchTerm && entry.logData) {
                    const logText = JSON.stringify(entry.logData).toLowerCase();
                    if (logText.includes(currentSearchTerm)) {
                        entry.classList.add('search-match');
                    }
                }
            }
        }

        function clearAllSearchMatches() {
            const container = document.getElementById('logs-container');
            const entries = container.getElementsByClassName('log-entry');
            for (let entry of entries) {
                entry.classList.remove('search-match');
                entry.classList.remove('active-entry');
            }
        }

        function updateSearchStats() {
            const statsEl = document.getElementById('search-stats');
            if (currentSearchTerm && serverSearchMatches.length > 0) {
                if (searchMatchIndex >= 0) {
                    statsEl.textContent = `${searchMatchIndex + 1} of ${serverSearchMatches.length}`;
                } else {
                    statsEl.textContent = `${serverSearchMatches.length} match${serverSearchMatches.length !== 1 ? 'es' : ''}`;
                }
            } else if (currentSearchTerm) {
                statsEl.textContent = `0 matches`;
            } else {
                statsEl.textContent = '';
            }
        }

        async function navigateSearchMatch(direction) {
            if (serverSearchMatches.length === 0) return;

            // Calculate next match index
            if (direction === 'next') {
                searchMatchIndex = (searchMatchIndex + 1) % serverSearchMatches.length;
            } else if (direction === 'prev') {
                searchMatchIndex = (searchMatchIndex - 1 + serverSearchMatches.length) % serverSearchMatches.length;
            }

            // Get the target match position in the filtered view
            const targetMatchPos = serverSearchMatches[searchMatchIndex];
            
            // Check if this match is visible in the current view
            const container = document.getElementById('logs-container');
            const entries = container.getElementsByClassName('log-entry');
            
            // Calculate current view range
            const currentViewStart = topOffset;
            const currentViewEnd = topOffset + entries.length;

            if (targetMatchPos >= currentViewStart && targetMatchPos < currentViewEnd) {
                // Match is visible - just highlight it
                highlightMatchAtPosition(targetMatchPos - currentViewStart);
                updateSearchStats();
            } else {
                // Match is not visible - load it with surrounding context
                await loadAndHighlightMatch(targetMatchPos);
            }
        }

        function highlightMatchAtPosition(elementIndex) {
            const container = document.getElementById('logs-container');
            const entries = container.getElementsByClassName('log-entry');
            
            // Clear all active markers
            for (let entry of entries) {
                entry.classList.remove('search-match');
                entry.classList.remove('active-entry');
            }
            
            if (elementIndex >= 0 && elementIndex < entries.length) {
                entries[elementIndex].classList.add('search-match');
                entries[elementIndex].classList.add('active-entry');
                entries[elementIndex].scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
            
            updateSearchStats();
        }

        async function loadAndHighlightMatch(targetPos) {
            // Load the match with surrounding logs to fill the gap
            isLoading = true;
            
            try {
                // Load a range around the target, centered on it
                const bufferSize = Math.floor(initialLimit / 2);
                const startOffset = Math.max(0, targetPos - bufferSize);
                const endOffset = targetPos + bufferSize;
                
                // Fetch to cover the range
                const response = await fetch(`/api/logs?offset=${startOffset}&limit=${endOffset - startOffset + 1}&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await response.json();
                const newLogs = data.logs || data;
                
                // Determine if we need to fill gap above or below current view
                const container = document.getElementById('logs-container');
                const entries = container.getElementsByClassName('log-entry');
                const currentViewStart = topOffset;
                const currentViewEnd = topOffset + entries.length;
                
                if (startOffset < currentViewStart) {
                    // Load above - prepend and adjust scroll using reference element
                    clearAllSearchMatches();
                    const firstEntry = container.querySelector('.log-entry');
                    const firstEntryTop = firstEntry ? firstEntry.getBoundingClientRect().top : null;
                    
                    // Render gap-filling logs above
                    const gapSize = currentViewStart - startOffset;
                    const aboveLogs = newLogs.slice(0, gapSize);
                    if (aboveLogs.length > 0) {
                        renderLogs(aboveLogs, true, startOffset);
                    }
                    
                    // Scroll to maintain reference element position
                    if (firstEntry && firstEntry.parentNode) {
                        const newFirstEntryTop = firstEntry.getBoundingClientRect().top;
                        const scrollAdjustment = newFirstEntryTop - firstEntryTop;
                        window.scrollBy(0, scrollAdjustment);
                    }
                    
                    topOffset = startOffset;
                } else if (endOffset > currentViewEnd) {
                    // Load below - append
                    clearAllSearchMatches();
                    const gapStart = currentViewEnd - startOffset;
                    const belowLogs = newLogs.slice(gapStart);
                    if (belowLogs.length > 0) {
                        renderLogs(belowLogs, false, startOffset + gapStart);
                    }
                    currentOffset = endOffset;
                    hasMore = true;
                } else {
                    // Target is within the new range, clear and reload that section
                    clearAllSearchMatches();
                    document.getElementById('logs-container').innerHTML = '';
                    renderLogs(newLogs, false, startOffset);
                    topOffset = startOffset;
                    currentOffset = startOffset + newLogs.length;
                    hasMore = true;
                }
                
                // Re-highlight current selection
                const newEntries = document.getElementsByClassName('log-entry');
                const offsetInView = targetPos - topOffset;
                highlightMatchAtPosition(offsetInView);
                
            } catch (e) {
                console.error("Error loading match:", e);
            } finally {
                isLoading = false;
            }
        }
        
        function applySearchHighlight_old() {
            const container = document.getElementById('logs-container');
            const entries = container.getElementsByClassName('log-entry');
            let matchCount = 0;
            
            for (let div of entries) {
                if (!currentSearchTerm) {
                    div.classList.remove('search-match');
                    continue;
                }
                
                // Search in the full log data attached to the element
                if (div.logData && JSON.stringify(div.logData).toLowerCase().includes(currentSearchTerm)) {
                     div.classList.add('search-match');
                     matchCount++;
                } else {
                     div.classList.remove('search-match');
                }
            }
            
            // Update search stats
            const statsEl = document.getElementById('search-stats');
            if (currentSearchTerm) {
                statsEl.textContent = `${matchCount} match${matchCount !== 1 ? 'es' : ''}`;
            } else {
                statsEl.textContent = '';
            }
        }

        function reorderLogKeys(log) {
            if (log.raw) return log;

            const priorityKeys = ["time", "msg", "datastore-name", "logger", "transaction-id"];
            const excludedKeys = ["content", "raw-request", "updates", "deletes", "raw-response", "response", "explicit-deletes", "updates-owner", "deletes-owner", "tree", "data"];
            const newLog = {};

            // Add priority keys first if they exist
            priorityKeys.forEach(key => {
                if (log.hasOwnProperty(key)) {
                    newLog[key] = log[key];
                }
            });

            // Add remaining keys
            Object.keys(log).forEach(key => {
                if (!priorityKeys.includes(key) && !excludedKeys.includes(key)) {
                    newLog[key] = log[key];
                }
            });

            return newLog;
        }

        function highlightColorForTerm(term) {
            const normalized = term.toLowerCase();
            if (highlightColorMap[normalized]) return highlightColorMap[normalized];
            const color = highlightPalette[highlightColorCursor % highlightPalette.length];
            highlightColorCursor++;
            highlightColorMap[normalized] = color;
            return color;
        }

        function toRgba(hex, alpha = 0.3) {
            const normalized = hex.replace('#', '');
            const full = normalized.length === 3 ? normalized.split('').map(c => c + c).join('') : normalized.padEnd(6, '0');
            const intVal = parseInt(full.slice(0, 6), 16);
            const r = (intVal >> 16) & 255;
            const g = (intVal >> 8) & 255;
            const b = intVal & 255;
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        function addHighlightFromInput() {
            const input = document.getElementById('highlight-input');
            if (!input) return;
            addHighlight(input.value);
        }

        function addHighlight(term) {
            if (!term) return;
            const clean = term.trim();
            if (!clean) return;
            const lower = clean.toLowerCase();
            if (highlightTerms.some(t => t.term.toLowerCase() === lower)) return;
            const color = highlightColorForTerm(clean);
            highlightTerms.push({ term: clean, color });
            renderHighlightBadges();
            applyHighlights();
            const input = document.getElementById('highlight-input');
            if (input) input.value = '';
            debounceSaveViewState();
        }

        function removeHighlight(term) {
            const targetLower = term.toLowerCase();
            const index = highlightTerms.findIndex(t => t.term.toLowerCase() === targetLower);
            if (index === -1) return;
            highlightTerms.splice(index, 1);
            renderHighlightBadges();
            applyHighlights();
            debounceSaveViewState();
        }

        function clearHighlights() {
            highlightTerms = [];
            highlightColorMap = {};
            highlightColorCursor = 0;
            renderHighlightBadges();
            applyHighlights();
            debounceSaveViewState();
        }

        function renderHighlightBadges() {
            const container = document.getElementById('highlights-container');
            if (!container) return;
            container.innerHTML = '';
            highlightTerms.forEach(({ term, color }) => {
                const badge = document.createElement('span');
                badge.className = 'highlight-badge';
                badge.style.setProperty('--highlight-bg', toRgba(color, 0.35));
                badge.style.setProperty('--highlight-border', color);

                const swatch = document.createElement('span');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = color;

                const label = document.createElement('span');
                label.textContent = term;

                const remove = document.createElement('span');
                remove.className = 'remove';
                remove.textContent = 'x';
                remove.onclick = (e) => {
                    e.stopPropagation();
                    removeHighlight(term);
                };
                badge.appendChild(swatch);
                badge.appendChild(label);
                badge.appendChild(remove);
                container.appendChild(badge);
            });
        }

        function applyHighlights() {
            const container = document.getElementById('logs-container');
            const entries = container.getElementsByClassName('log-entry');
            const normalized = highlightTerms.map(t => ({ lower: t.term.toLowerCase(), color: t.color }));
            for (let entry of entries) {
                entry.classList.remove('highlight-match');
                entry.style.removeProperty('--highlight-color');
                if (normalized.length === 0 || !entry.logData) continue;
                const logText = JSON.stringify(entry.logData).toLowerCase();
                for (let item of normalized) {
                    if (logText.includes(item.lower)) {
                        entry.classList.add('highlight-match');
                        entry.style.setProperty('--highlight-color', toRgba(item.color, 0.32));
                        break;
                    }
                }
            }
        }

        function getHighlightMatchColor(log) {
            if (!log || highlightTerms.length === 0) return null;
            const text = JSON.stringify(log).toLowerCase();
            for (const item of highlightTerms) {
                if (text.includes(item.term.toLowerCase())) {
                    return item.color;
                }
            }
            return null;
        }

        function renderLogs(logsToRender, prepend = false, baseIndex = 0) {
            const container = document.getElementById('logs-container');
            // Remove 'Loading...' if present
            if (container.textContent === 'Loading...' && logsToRender.length > 0) {
                 container.innerHTML = '';
            }
            
            // Use fragment for batch insertion
            const fragment = document.createDocumentFragment();

            logsToRender.forEach((log, index) => {
                const div = document.createElement('div');
                div.className = 'log-entry';
                div.logData = log; // Attach data for search
                const globalIndex = baseIndex + index;
                div.dataset.index = globalIndex;

                let isInteresting = false;
                if (log.msg && interestingMsgs.includes(log.msg)) {
                    div.classList.add('highlight');
                    // Ellipsis indicator should attach to content, not the flex container
                    isInteresting = true;
                }
                
                // Highlight ERROR level logs
                if (log.level && log.level.toUpperCase().includes('ERROR')) {
                    div.classList.add('error-level');
                }
                
                // Check search immediately for new items
                if (currentSearchTerm && JSON.stringify(log).toLowerCase().includes(currentSearchTerm)) {
                    div.classList.add('search-match');
                }

                const highlightColor = getHighlightMatchColor(log);
                if (highlightColor) {
                    div.classList.add('highlight-match');
                    div.style.setProperty('--highlight-color', toRgba(highlightColor, 0.32));
                } else {
                    div.style.removeProperty('--highlight-color');
                }

                if (markedIndices.has(globalIndex)) {
                    div.classList.add('marked-entry');
                }

                // Gutter (acts as the clickable strip)
                const gutter = document.createElement('div');
                gutter.className = 'log-entry-gutter';
                if (isInteresting) {
                    gutter.classList.add('interesting');
                }
                gutter.title = 'Click to mark/highlight';
                gutter.onclick = (e) => {
                    e.stopPropagation();
                    div.classList.toggle('marked-entry');
                    const idx = parseInt(div.dataset.index);
                    if (div.classList.contains('marked-entry')) {
                        markedIndices.add(idx);
                    } else {
                        markedIndices.delete(idx);
                    }
                    debounceSaveViewState();
                };
                div.appendChild(gutter);

                // Content
                const content = document.createElement('span');
                content.className = 'log-content-wrapper';
                // Display whole log line
                if (log.raw) {
                    content.textContent = log.raw;
                } else {
                    const orderedLog = reorderLogKeys(log);
                    content.textContent = JSON.stringify(orderedLog);
                }
                // Attach ellipsis indicator directly after text content
                if (isInteresting) {
                    content.classList.add('drill-downable');
                }
                div.appendChild(content);
                
                let clickTimeout = null;

                div.onclick = (e) => {
                   const selection = window.getSelection();
                   if (selection.toString().length > 0) {
                       return;
                   }

                   if (clickTimeout) clearTimeout(clickTimeout);
                   clickTimeout = setTimeout(() => {
                       document.querySelectorAll('.log-entry.active-entry').forEach(el => el.classList.remove('active-entry'));
                       div.classList.add('active-entry');

                       if (isInteresting || true) { // Make all clickable for inspection
                           showDetails(log);
                       }
                   }, 250);
                };

                div.ondblclick = (e) => {
                    if (clickTimeout) clearTimeout(clickTimeout);

                    const selection = window.getSelection();
                    const text = selection.toString().trim();
                    if (text) {
                        addHighlight(text);
                        e.stopPropagation();
                    }
                };
                fragment.appendChild(div);
            });

            if (prepend && container.firstChild) {
                container.insertBefore(fragment, container.firstChild);
            } else {
                container.appendChild(fragment);
            }
        }

        async function fetchPrevious() {
            if (isLoading) return;
            isLoading = true;

            // Compute range
            const fetchLimit = limit; // 50
            const start = Math.max(0, topOffset - fetchLimit);
            const count = topOffset - start;
            
            if (count <= 0) {
                isLoading = false;
                return;
            }

            try {
                const response = await fetch(`/api/logs?offset=${start}&limit=${count}&datastore=${encodeURIComponent(currentFilter)}`);
                const data = await response.json();
                const newLogs = data.logs || data;
                
                if (newLogs.length > 0) {
                    // Get the first log entry currently in view as reference
                    const container = document.getElementById('logs-container');
                    const firstEntry = container.querySelector('.log-entry');
                    const firstEntryTop = firstEntry ? firstEntry.getBoundingClientRect().top : null;
                    
                    // Prepend new logs
                    renderLogs(newLogs, true, start);
                    
                    // Find the reference element after rendering and scroll to maintain its position
                    if (firstEntry && firstEntry.parentNode) {
                        // Scroll so the old first entry stays in the same visual position
                        const newFirstEntryTop = firstEntry.getBoundingClientRect().top;
                        const scrollAdjustment = newFirstEntryTop - firstEntryTop;
                        window.scrollBy(0, scrollAdjustment);
                    }
                    
                    topOffset = start;
                }

            } catch (e) {
                console.error(e);
            } finally {
                isLoading = false;
            }
        }

        // Virtual Scroll State (Global)
        let flatNodes = [];
        let visibleIndices = []; 
        let visibleMatchIndices = [];
        let matchMap = new Map();
        let collapsedNodeIds = new Set();
        const ROW_HEIGHT = 20;
        
        async function showDetails(logData) {
            const modal = document.getElementById("myModal");
            const modalText = document.getElementById("modal-text");
            
            // 1. Show modal immediately with loading state
            modal.style.display = "block";
            document.body.classList.add('modal-open');
            modalText.innerHTML = '<div style="padding: 20px; font-size: 1.2em; color: #666;">Processing comprehensive log data... <span id="proc-status"></span></div>';
            
            // Yield to UI to allow render
            await new Promise(r => setTimeout(r, 10));

            try {
                // Clear previous search state
                document.getElementById('modal-search').value = "";
                document.getElementById('modal-stats').textContent = "";
                modalSearchMatches = [];
                modalSearchIndex = -1;

                // Reset virtualization state
                flatNodes = [];
                collapsedNodeIds = new Set();
                visibleIndices = [];
                visibleMatchIndices = [];
                matchMap = new Map();
                
                // Deep clone and process
                const data = JSON.parse(JSON.stringify(logData));
                
                const statusSpan = document.getElementById('proc-status');
                if (statusSpan) statusSpan.textContent = "(Parsing nested JSON)";
                await new Promise(r => setTimeout(r, 10)); // Yield
                
                processNestedJson(data);

                if (statusSpan) statusSpan.textContent = "(Decoding jsonVal fields)";
                await new Promise(r => setTimeout(r, 10)); // Yield
                processJsonValFields(data);

                if (statusSpan) statusSpan.textContent = "(Decoding leaf variants)";
                await new Promise(r => setTimeout(r, 10)); // Yield
                
                await processLeafVariants(data);
                
                if (statusSpan) statusSpan.textContent = "(Building view)";
                await new Promise(r => setTimeout(r, 10)); // Yield

                currentModalData = data;
                
                // Initialize container structure for virtual scroll
                modalText.innerHTML = '<div id="virtual-spacer"></div><div id="virtual-content"></div>';
                
                // Initial render
                renderModalContent();

            } catch (e) {
                console.error(e);
                modalText.innerHTML = `<div style="padding: 20px; color: red;">Error processing log: ${e.message}</div>`;
            }
        }

        function renderModalContent() {
            if (!currentModalData) return;
            const term = document.getElementById('modal-search').value;
            const modalText = document.getElementById("modal-text");
            
            // Flatten if needed
            if (flatNodes.length === 0) {
                 flattenData(currentModalData);
            }
            
            // Calculate Matches
            calculateMatches(term);
            
            // Calculate Layout
            recalcVisibleRows();
            
            // Setup Scroll
            modalText.onscroll = onModalScroll;
            onModalScroll(); 
            
            // Update Stats
            updateModalStats();
            
            if (term && visibleMatchIndices.length > 0) {
                 navigateToMatch(0);
            }
        }

        function onModalScroll() {
            const modalText = document.getElementById("modal-text");
            const spacer = document.getElementById("virtual-spacer");
            const content = document.getElementById("virtual-content");
            if (!spacer || !content) return; 

            const scrollTop = modalText.scrollTop;
            const containerHeight = modalText.clientHeight;
            
            // Update spacer
            spacer.style.height = (visibleIndices.length * ROW_HEIGHT) + 'px';
            
            // Calculate slice
            const startIndex = Math.floor(scrollTop / ROW_HEIGHT);
            const buffer = 10;
            const effectiveSortStart = Math.max(0, startIndex - buffer);
            const count = Math.ceil(containerHeight / ROW_HEIGHT) + 2 * buffer;
            const endIndex = Math.min(visibleIndices.length, effectiveSortStart + count);
            
            // Render slice
            let html = '';
            const term = document.getElementById('modal-search').value;
            let regex = null;
            if (term) regex = new RegExp(`(${escapeRegExp(term)})`, 'gi');

            for (let i = effectiveSortStart; i < endIndex; i++) {
                const nodeIdx = visibleIndices[i];
                if (nodeIdx < flatNodes.length) {
                    const node = flatNodes[nodeIdx];
                    html += renderRow(node, regex, i);
                }
            }
            
            content.innerHTML = html;
            content.style.transform = `translateY(${effectiveSortStart * ROW_HEIGHT}px)`;
        }

        function renderRow(node, regex, visualIndex) {
            const indent = '  '.repeat(node.depth);
            let content = '';
            
            // Helper for HL
            const hl = (txt) => {
                if (!regex) return escapeHtml(txt);
                return escapeHtml(txt).replace(regex, '<span class="modal-match">$1</span>');
            };
            const escapeHtml = (str) => String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Common parts
            let keyPart = '';
            if (node.key !== undefined) {
                keyPart = `<span class="json-key">"${hl(node.key)}"</span>: `;
            }
            let comma = node.comma ? ',' : '';

            // Render based on type
            if (node.type.startsWith('scalar')) {
                let valHtml = '';
                if (node.value === null) valHtml = '<span class="json-null">null</span>';
                else if (typeof node.value === 'boolean') valHtml = `<span class="json-boolean">${node.value}</span>`;
                else if (typeof node.value === 'number') valHtml = `<span class="json-value">${node.value}</span>`;
                else {
                    const strVal = hl(node.value);
                    if (node.type === 'scalar') {
                        valHtml = `<span class="json-string">"${strVal}"</span>`;
                    } else if (node.type === 'scalar_multiline_start') {
                        valHtml = `<span class="json-string">"${strVal}`;
                    } else if (node.type === 'scalar_multiline_mid') {
                        valHtml = `<span class="json-string">${strVal}`;
                    } else if (node.type === 'scalar_multiline_end') {
                         valHtml = `<span class="json-string">${strVal}"</span>`;
                    }
                }
                
                content = `${keyPart}${valHtml}${comma}`;
            } else if (node.type === 'start_obj') {
                const isCollapsed = collapsedNodeIds.has(node.id);
                const placeholder = isCollapsed ? `<span id="cp-${node.id}" class="collapsible-placeholder" style="display:inline" onclick="toggleCollapse(${node.id})">...}</span>` : '';
                const brace = '{' + placeholder;
                content = `${keyPart}${brace}`;
                if (!isCollapsed && node.count === 0) content += '}'; // Empty object
            } else if (node.type === 'start_arr') {
                const isCollapsed = collapsedNodeIds.has(node.id);
                const placeholder = isCollapsed ? `<span id="cp-${node.id}" class="collapsible-placeholder" style="display:inline" onclick="toggleCollapse(${node.id})">...]</span>` : '';
                const bracket = '[' + placeholder;
                content = `${keyPart}${bracket}`;
                if (!isCollapsed && node.count === 0) content += ']'; // Empty array
            } else if (node.type === 'end_obj') {
                content = `}${comma}`;
            } else if (node.type === 'end_arr') {
                content = `]${comma}`;
            }

            // Gutter
            let gutter = '';
            if (node.type === 'start_obj' || node.type === 'start_arr') {
                 if (node.count > 0) {
                     const isCollapsed = collapsedNodeIds.has(node.id);
                     const sign = isCollapsed ? '+' : '-';
                     gutter = `<span class="gutter-btn" onclick="toggleCollapse(${node.id})">${sign}</span>`;
                 }
            }

            // Active Row Highlight
            let extraClass = '';
            if (modalSearchIndex !== -1 && visibleMatchIndices[modalSearchIndex] === visualIndex) {
                 extraClass = ' active-match-row';
            }

            return `<div class="log-row${extraClass}" style="height:${ROW_HEIGHT}px">
                    <div class="log-gutter">${gutter}</div>
                    <div class="log-content">${indent}${content}</div>
                </div>`;
        }

        function flattenData(data) {
            flatNodes = [];
            let idCounter = 0;

            function recurse(obj, depth, key, isLast) {
                const comma = !isLast;

                if (obj === null || typeof obj !== 'object') {
                    if (typeof obj === 'string' && obj.includes('\n')) {
                        const lines = obj.split(/\r?\n/);
                        lines.forEach((line, idx) => {
                            let type = 'scalar_multiline_mid';
                            let nodeKey = undefined;
                            let nodeComma = false;
                            
                            if (idx === 0) {
                                type = 'scalar_multiline_start';
                                nodeKey = key;
                            }
                            if (idx === lines.length - 1) {
                                type = 'scalar_multiline_end';
                                nodeComma = comma;
                            }
                            
                            flatNodes.push({ type, depth: depth + (idx > 0 ? 1 : 0), key: nodeKey, value: line, comma: nodeComma });
                        });
                        return;
                    }
                    flatNodes.push({ type: 'scalar', depth, key, value: obj, comma });
                    return;
                }

                if (Array.isArray(obj)) {
                    if (obj.length === 0) {
                         flatNodes.push({ type: 'start_arr', depth, key, count: 0, comma });
                         return;
                    }
                    const id = ++idCounter;
                    const index = flatNodes.length;
                    // Store comma here for collapsed state
                    flatNodes.push({ type: 'start_arr', depth, key, id, count: obj.length, comma: comma }); 
                    
                    for (let i = 0; i < obj.length; i++) {
                        recurse(obj[i], depth + 1, undefined, i === obj.length - 1);
                    }
                    
                    flatNodes[index].skipTo = flatNodes.length; // Index of end node
                    flatNodes.push({ type: 'end_arr', depth, parentId: id, comma });
                    return;
                }

                const keys = Object.keys(obj);
                if (keys.length === 0) {
                     flatNodes.push({ type: 'start_obj', depth, key, count: 0, comma });
                     return;
                }

                const id = ++idCounter;
                const index = flatNodes.length;
                flatNodes.push({ type: 'start_obj', depth, key, id, count: keys.length, comma: comma });
                
                for (let i = 0; i < keys.length; i++) {
                    recurse(obj[keys[i]], depth + 1, keys[i], i === keys.length - 1);
                }

                flatNodes[index].skipTo = flatNodes.length;
                flatNodes.push({ type: 'end_obj', depth, parentId: id, comma });
            }

            recurse(data, 0, undefined, true);
        }

        function calculateMatches(term) {
            matchMap.clear();
            if (!term) return;
            const lowerTerm = term.toLowerCase(); 
            
            flatNodes.forEach((node, idx) => {
                let text = '';
                if (node.key) text += node.key;
                if (node.value !== undefined && node.value !== null) text += String(node.value);
                
                if (text.toLowerCase().includes(lowerTerm)) {
                    matchMap.set(idx, true);
                }
            });
        }

        function recalcVisibleRows() {
            visibleIndices = [];
            let i = 0;
            while (i < flatNodes.length) {
                const node = flatNodes[i];
                visibleIndices.push(i);
                
                // If collapsed, skip to text node
                if ((node.type === 'start_obj' || node.type === 'start_arr') && collapsedNodeIds.has(node.id) && node.count > 0) {
                     // We skip the children AND the end node
                     if (node.skipTo) {
                         i = node.skipTo;
                     }
                } 
                i++;
            }
            recalcMatchIndices();
        }

        function recalcMatchIndices() {
            visibleMatchIndices = [];
            visibleIndices.forEach((nodeIdx, visualIndex) => {
                if (matchMap.has(nodeIdx)) {
                    visibleMatchIndices.push(visualIndex);
                }
            });
        }

        function toggleCollapse(id) {
            if (collapsedNodeIds.has(id)) {
                collapsedNodeIds.delete(id);
            } else {
                collapsedNodeIds.add(id);
            }
            recalcVisibleRows();
            onModalScroll();
            
            const term = document.getElementById('modal-search').value;
            if (term) {
                 recalcMatchIndices();
                 updateModalStats();
            }
        }

        function navigateToMatch(index) {
            if (visibleMatchIndices.length === 0) return;
             
             // Wrap index
            if (index >= visibleMatchIndices.length) index = 0;
            if (index < 0) index = visibleMatchIndices.length - 1;
            
            modalSearchIndex = index;
            
            // Scroll to it
            const targetVisualIdx = visibleMatchIndices[modalSearchIndex];
            // We need to calculate scroll position
            const modalText = document.getElementById("modal-text");
            // Approximate position
            modalText.scrollTop = targetVisualIdx * ROW_HEIGHT - (modalText.clientHeight / 2);
            
            updateModalStats();
        }

        function updateModalStats() {
            const stats = document.getElementById('modal-stats');
            const term = document.getElementById('modal-search').value;
            if (visibleMatchIndices.length > 0) {
                stats.textContent = `${modalSearchIndex + 1} of ${visibleMatchIndices.length}`;
            } else if (term) {
                stats.textContent = "0 matches";
            } else {
                stats.textContent = "";
            }
        }
        
        function escapeRegExp(string) {
            return string.replace(/[.*+?^!:${}()|[\]\\]/g, '\\$&');
        }

        function processNestedJson(obj) {
            for (const key in obj) {
                if (typeof obj[key] === 'string') {
                    if ((obj[key].startsWith('{') || obj[key].startsWith('[')) && (key === 'content' || key === 'raw-request' || key === 'updates' || key === 'deletes' || key === 'raw-response' || key === 'explicit-deletes' || key === 'data')) {
                         try {
                             obj[key] = JSON.parse(obj[key]);
                             processNestedJson(obj[key]);
                         } catch (e) {}
                    }
                    // Basic XML pretty print for 'response' field
                    if (key === 'response' && typeof obj[key] === 'string' && obj[key].startsWith('<')) {
                         // Simple formatting: newlines after >
                         // Or we can rely on displaying as pre-wrap, but it might be one long string.
                         // Let's perform a simple replace for formatting
                         obj[key] = formatXml(obj[key]);
                    }
                } else if (typeof obj[key] === 'object' && obj[key] !== null) {
                    processNestedJson(obj[key]);
                }
            }
        }

        function formatXml(xml) {
            let formatted = '';
            let pad = 0;
            // Add newlines
            xml = xml.replace(/>\s*</g, '>\r\n<');
            
            xml.split('\r\n').forEach(node => {
                let indent = 0;
                if (node.match(/.+<\/\w[^>]*>$/)) {
                    indent = 0;
                } else if (node.match(/^<\/\w/)) {
                    if (pad !== 0) pad -= 1;
                } else if (node.match(/^<\w[^>]*[^\/]>.*$/)) {
                    indent = 1;
                }
                
                formatted += '  '.repeat(pad) + node + '\r\n';
                pad += indent;
            });
            return formatted.trim();
        }

        // Decode base64 (standard or URL-safe) to UTF-8 string
        function decodeBase64Utf8(b64) {
            try {
                let s = String(b64 || '');
                s = s.replace(/-/g, '+').replace(/_/g, '/');
                while (s.length % 4 !== 0) s += '=';
                const binary = atob(s);
                const bytes = new Uint8Array(binary.length);
                for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
                if (typeof TextDecoder !== 'undefined') {
                    return new TextDecoder('utf-8').decode(bytes);
                }
                // Fallback best-effort
                return decodeURIComponent(escape(binary));
            } catch (e) {
                return null;
            }
        }

        // Decode base64-encoded JSON found in jsonVal fields and attach as jsonVal_decoded
        function processJsonValFields(obj) {
            function traverse(o) {
                if (typeof o !== 'object' || o === null) return;
                for (const key in o) {
                    const val = o[key];
                    // Support common casings: jsonVal, json_val, json-val
                    const isJsonValKey = (key === 'jsonVal' || key === 'json_val' || key === 'json-val');
                    if (isJsonValKey && typeof val === 'string' && !('jsonVal_decoded' in o)) {
                        const decoded = decodeBase64Utf8(val);
                        if (decoded !== null) {
                            let parsed = null;
                            try {
                                parsed = JSON.parse(decoded);
                            } catch (e) {
                                parsed = decoded; // Not JSON, keep as string
                            }
                            o['jsonVal_decoded'] = parsed;
                        }
                    }
                    if (key !== 'jsonVal_decoded') traverse(val);
                }
            }
            traverse(obj);
        }

        async function processLeafVariants(obj) {
             const targets = [];
             
             // Recursively traverse and collect targets
             function traverse(o) {
                 if (typeof o !== 'object' || o === null) return;
                 
                 // Check for leafVariant
                 if (o.hasOwnProperty('leafVariant') && typeof o.leafVariant === 'string') {
                     targets.push(o);
                 }
                 
                 // Recurse children
                 for (const key in o) {
                     // Skip what we just added or non-objects
                     if (key !== 'leafVariant_decoded' && key !== 'leafVariant_error') {
                         traverse(o[key]);
                     }
                 }
             }

             traverse(obj);
             
             if (targets.length === 0) return;

             try {
                 const values = targets.map(t => t.leafVariant);
                 
                 // Send batch request
                 const res = await fetch('/api/decode/batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values })
                 });
                 
                 if (!res.ok) throw new Error(await res.text());
                 
                 const payload = await res.json();
                 const results = Array.isArray(payload)
                    ? payload
                    : (Array.isArray(payload?.decoded) ? payload.decoded : []);
                 
                 // Apply results back to objects
                 for (let i = 0; i < targets.length; i++) {
                     const result = results[i];
                     const target = targets[i];
                     
                     if (typeof result === 'undefined') {
                         target['leafVariant_error'] = 'Batch decode returned incomplete results';
                         continue;
                     }

                     // Check if result indicates error (our backend logic returns {error: "..."} on failure)
                     // But valid result is also an object. 
                     // Valid TypedValue JSON usually has keys like 'string_val', 'int_val', etc.
                     // Error object has 'error' key.
                     if (result && result.error) {
                         target['leafVariant_error'] = result.error;
                     } else {
                         target['leafVariant_decoded'] = result;
                     }
                 }
                 
             } catch (e) {
                 console.error("Batch decode failed", e);
                 // Fallback error marking
                 targets.forEach(t => t['leafVariant_error'] = "Batch failed: " + e.message);
             }
        }

        async function decodeValue(base64Str) {
            const res = await fetch('/api/decode', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ value: base64Str })
            });
            if (!res.ok) throw new Error(await res.text());
            return await res.json();
        }

        // Modal close logic
        const modal = document.getElementById("myModal");
        const span = document.getElementsByClassName("close")[0];
        const closeModal = function() { 
            modal.style.display = "none";
            document.body.classList.remove('modal-open');
        }
        span.onclick = closeModal;
        window.onclick = function(event) {
            if (event.target == modal) { closeModal(); }
        }
        document.addEventListener('keydown', function(event) {
            if (event.key === "Escape") {
                if (modal.style.display === "block") {
                    closeModal();
                } else {
                    clearSearch();
                }
            }
        });

        // Overview shortcut: fill selected text into main search (Ctrl+Shift+F or Alt+S)
        document.addEventListener('keydown', function(event) {
            const modalEl = document.getElementById('myModal');
            const modalVisible = modalEl && modalEl.style.display === 'block';
            // Act only in overview view
            if (modalVisible) return;

            const key = String(event.key || '').toLowerCase();
            const isShortcut = (event.ctrlKey && event.shiftKey && key === 'f') || (event.altKey && key === 's');
            if (!isShortcut) return;

            // Don't interfere while typing in inputs/textareas or content-editable elements
            const active = document.activeElement;
            if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;

            const selectionText = window.getSelection().toString().trim();
            if (!selectionText) return;

            addHighlight(selectionText);

            event.preventDefault();
            event.stopPropagation();
        });
        
        // Modal Search Listeners
        document.getElementById('modal-search').addEventListener('input', () => {
             renderModalContent();
        });
        document.getElementById('modal-next').addEventListener('click', () => {
             navigateToMatch(modalSearchIndex + 1);
        });
        document.getElementById('modal-prev').addEventListener('click', () => {
             navigateToMatch(modalSearchIndex - 1);
        });
        document.getElementById('modal-search').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (e.shiftKey) {
                    navigateToMatch(modalSearchIndex - 1);
                } else {
                    navigateToMatch(modalSearchIndex + 1);
                }
            }
        });

        document.getElementById('modal-copy').addEventListener('click', async () => {
            if (!currentModalData) return;
            try {
                // Generate pretty text from flatNodes (visual representation)
                const text = getPrettyText();
                await navigator.clipboard.writeText(text);
                const btn = document.getElementById('modal-copy');
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            } catch (err) {
                console.error('Failed to copy!', err);
                alert('Failed to copy to clipboard. Ensure you are using localhost or HTTPS.');
            }
        });
        
        function getPrettyText() {
             if (flatNodes.length === 0 && currentModalData) {
                 flattenData(currentModalData);
             }
             if (flatNodes.length === 0) return "";

             return flatNodes.map(node => {
                const indent = '  '.repeat(node.depth);
                let line = indent;
                
                if (node.key !== undefined) {
                    line += `"${node.key}": `;
                }
                
                if (node.type === 'scalar') {
                    if (node.value === null) line += 'null';
                    else if (typeof node.value === 'boolean') line += node.value;
                    else if (typeof node.value === 'number') line += node.value;
                    else line += `"${node.value}"`;
                } else if (node.type === 'scalar_multiline_start') {
                    line += `"${node.value}`;
                } else if (node.type === 'scalar_multiline_mid') {
                    line += node.value;
                } else if (node.type === 'scalar_multiline_end') {
                    line += `${node.value}"`;
                } else if (node.type === 'start_obj') {
                    line += node.count === 0 ? '{}' : '{';
                } else if (node.type === 'start_arr') {
                    line += node.count === 0 ? '[]' : '[';
                } else if (node.type === 'end_obj') {
                    line += '}';
                } else if (node.type === 'end_arr') {
                    line += ']';
                }
                
                if (node.comma) line += ',';
                return line;
             }).join('\n');
        }

        init();
    </script>
